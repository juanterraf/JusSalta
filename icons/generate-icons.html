<!DOCTYPE html>
<html>
<head>
  <title>IOL Salta Icons</title>
  <style>
    body { font-family: system-ui; padding: 40px; background: #f7f6f3; }
    .preview { display: flex; gap: 24px; align-items: end; margin: 20px 0; }
    .preview div { text-align: center; font-size: 12px; color: #787774; }
    canvas { border: 1px solid #e3e2de; background: #fff; border-radius: 8px; }
    button { padding: 12px 24px; font-size: 14px; cursor: pointer; background: #37352f; color: white; border: none; border-radius: 6px; margin: 8px 4px; }
    button:hover { background: #1a1a1a; }
    .note { margin-top: 16px; color: #787774; font-size: 13px; }
  </style>
</head>
<body>
  <h1>IOL Salta - Generar Iconos</h1>
  <p>Reloj + balanza de justicia - colores terracota/naranja para Salta</p>

  <div class="preview">
    <div><canvas id="c128" width="128" height="128"></canvas><br>128px</div>
    <div><canvas id="c48" width="48" height="48"></canvas><br>48px</div>
    <div><canvas id="c16" width="16" height="16"></canvas><br>16px</div>
  </div>

  <button onclick="downloadAll()">Descargar los 3 PNGs</button>
  <button onclick="downloadOne(128)">Solo 128px</button>
  <button onclick="downloadOne(48)">Solo 48px</button>
  <button onclick="downloadOne(16)">Solo 16px</button>

  <p class="note">Despues de descargar, reemplaza los archivos icon16.png, icon48.png e icon128.png en la carpeta icons/ y recarga la extension.</p>

<script>
function drawIcon(size) {
  const canvas = document.getElementById('c' + size);
  const ctx = canvas.getContext('2d');
  const s = size / 128;
  ctx.clearRect(0, 0, size, size);

  // Rounded square background - terracotta/warm red for Salta
  const r = size * 0.18;
  const pad = size * 0.02;
  ctx.beginPath();
  ctx.roundRect(pad, pad, size - pad*2, size - pad*2, r);
  // Warm terracotta gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#c0392b');
  grad.addColorStop(1, '#922b21');
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.save();
  ctx.translate(size/2, size/2);

  // --- Clock circle ---
  ctx.beginPath();
  ctx.arc(0, 0, 34*s, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fill();

  // Clock outline
  ctx.beginPath();
  ctx.arc(0, 0, 32*s, 0, Math.PI * 2);
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2.5*s;
  ctx.stroke();

  // Hour marks
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2*s;
  ctx.lineCap = 'round';
  for (var i = 0; i < 12; i++) {
    var angle = (i * 30 - 90) * Math.PI / 180;
    var inner = i % 3 === 0 ? 25*s : 27*s;
    ctx.beginPath();
    ctx.moveTo(Math.cos(angle) * inner, Math.sin(angle) * inner);
    ctx.lineTo(Math.cos(angle) * 30*s, Math.sin(angle) * 30*s);
    ctx.stroke();
  }

  // Clock hands
  ctx.strokeStyle = '#ffffff';
  ctx.lineCap = 'round';

  // Hour hand (10 o'clock position)
  ctx.lineWidth = 3*s;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  var hAngle = (300 - 90) * Math.PI / 180;
  ctx.lineTo(Math.cos(hAngle) * 16*s, Math.sin(hAngle) * 16*s);
  ctx.stroke();

  // Minute hand (2 o'clock position)
  ctx.lineWidth = 2*s;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  var mAngle = (60 - 90) * Math.PI / 180;
  ctx.lineTo(Math.cos(mAngle) * 24*s, Math.sin(mAngle) * 24*s);
  ctx.stroke();

  // Center dot
  ctx.beginPath();
  ctx.arc(0, 0, 3*s, 0, Math.PI * 2);
  ctx.fillStyle = '#f39c12';
  ctx.fill();

  // --- Small balance/scales icon at bottom ---
  var by = 18*s;

  // Pillar
  ctx.strokeStyle = '#f39c12';
  ctx.lineWidth = 2*s;
  ctx.beginPath();
  ctx.moveTo(0, by - 4*s);
  ctx.lineTo(0, by + 10*s);
  ctx.stroke();

  // Beam
  ctx.beginPath();
  ctx.moveTo(-12*s, by);
  ctx.lineTo(12*s, by);
  ctx.stroke();

  // Left pan
  ctx.beginPath();
  ctx.arc(-12*s, by + 6*s, 4*s, 0, Math.PI);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-12*s, by);
  ctx.lineTo(-12*s, by + 6*s);
  ctx.stroke();

  // Right pan
  ctx.beginPath();
  ctx.arc(12*s, by + 6*s, 4*s, 0, Math.PI);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(12*s, by);
  ctx.lineTo(12*s, by + 6*s);
  ctx.stroke();

  // Base
  ctx.lineWidth = 2.5*s;
  ctx.beginPath();
  ctx.moveTo(-6*s, by + 10*s);
  ctx.lineTo(6*s, by + 10*s);
  ctx.stroke();

  ctx.restore();
}

[128, 48, 16].forEach(drawIcon);

function downloadOne(size) {
  var canvas = document.getElementById('c' + size);
  var link = document.createElement('a');
  link.download = 'icon' + size + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function downloadAll() {
  [16, 48, 128].forEach(function(s) {
    setTimeout(function() { downloadOne(s); }, s * 10);
  });
}
</script>
</body>
</html>
