<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>IOL Salta - Configuracion</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #37352f;
      max-width: 480px;
      margin: 20px auto;
      padding: 0 20px;
    }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 12px; font-weight: 500; color: #787774; margin-bottom: 4px; }
    input { width: 100%; padding: 8px 12px; border: 1px solid #e3e2de; border-radius: 4px; font-size: 14px; color: #37352f; }
    input:focus { outline: none; border-color: #2383e2; box-shadow: 0 0 0 2px #e8f0fe; }
    button { padding: 8px 20px; background: #37352f; color: white; border: none; border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer; }
    button:hover { background: #1a1a1a; }
    .status { margin-top: 8px; font-size: 12px; color: #0f7b6c; }
    .hint { font-size: 11px; color: #b4b4b0; margin-top: 2px; }
  </style>
</head>
<body>
  <h1>IOL Salta - Configuracion</h1>
  <div class="form-group">
    <label for="poll-interval">Intervalo de polling (minutos)</label>
    <input type="number" id="poll-interval" min="5" max="120" value="15">
    <p class="hint">Cada cuantos minutos verificar novedades en expedientes monitoreados (min. 5)</p>
  </div>
  <button id="btn-save">Guardar</button>
  <p id="status" class="status"></p>
  <script src="options.js"></script>
</body>
</html>
